<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar lab · LabClock</title>
  <meta name="theme-color" content="#F5F0E6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#11141C" media="(prefers-color-scheme: dark)">

  <link rel="icon" href="https://nicchon.com/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('app-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>

<header class="site-header">
  <a href="./" class="back-link" aria-label="Voltar pro labclock">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    <span class="back-link-text">labclock</span>
  </a>
  <button type="button" class="theme-toggle" aria-label="Alternar tema" title="Alternar tema">
    <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
  </button>
</header>

<main class="container-login">
  <article class="card-login card-signup">
    <p class="font-mono-meta">labclock / criar conta</p>
    <h1>Crie seu lab.</h1>
    <p class="lede">
      Cada lab tem cronômetros, salas e técnicos isolados. Você será o admin
      do lab e poderá adicionar técnicos depois. Grátis, sem limite.
    </p>

    <form id="form-signup" class="form-login">
      <fieldset class="signup-fieldset">
        <legend>Lab</legend>
        <div class="field">
          <label for="tenant-nome">Nome do lab</label>
          <input type="text" id="tenant-nome" required maxlength="120" placeholder="Ex: Laboratório de Química Orgânica">
        </div>
        <div class="field">
          <label for="tenant-slug">Slug do lab (URL) <span class="field-hint">— letras minúsculas e números, 4-20</span></label>
          <input type="text" id="tenant-slug" required minlength="4" maxlength="20" pattern="[a-z0-9]+" placeholder="autopreenchido a partir do nome">
        </div>
      </fieldset>

      <fieldset class="signup-fieldset">
        <legend>Admin</legend>
        <div class="field">
          <label for="admin-nome">Seu nome</label>
          <input type="text" id="admin-nome" required maxlength="120" autocomplete="name">
        </div>
        <div class="field">
          <label for="admin-email">Seu email</label>
          <input type="email" id="admin-email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="admin-senha">Senha <span class="field-hint">— mínimo 8 caracteres</span></label>
          <input type="password" id="admin-senha" required minlength="8" autocomplete="new-password">
        </div>
      </fieldset>

      <p class="erro" id="erro" hidden></p>
      <button type="submit" class="btn-primary" id="btn-submit">Criar lab e entrar</button>
    </form>

    <p class="login-footer">
      Já tem conta? <a href="login.html">Entrar →</a>
    </p>
  </article>
</main>

<script src="assets/jquery-3.6.1.min.js"></script>
<script src="assets/criar-conta.js"></script>
</body>
</html>
