<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil · LabClock</title>
  <meta name="theme-color" content="#F5F0E6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#11141C" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex">

  <link rel="icon" href="https://nicchon.com/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('app-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>

<header class="site-header">
  <a href="./" class="back-link" aria-label="Voltar pro labclock">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    <span class="back-link-text">labclock</span>
  </a>
  <button type="button" class="theme-toggle" aria-label="Alternar tema" title="Alternar tema">
    <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
  </button>
</header>

<main class="container-login">
  <article class="card-login" id="card-perfil">
    <p class="font-mono-meta">labclock / perfil</p>
    <h1>Perfil.</h1>
    <p class="lede">
      Logado como <strong id="meu-nome">—</strong> (<span id="meu-email">—</span>).
    </p>

    <h2 class="bloco-titulo" style="margin-top:2rem">Trocar senha</h2>
    <form id="form-senha" class="form-login">
      <div class="field"><label for="senha-atual">Senha atual</label><input type="password" id="senha-atual" required autocomplete="current-password"></div>
      <div class="field"><label for="senha-nova">Senha nova (mín. 8)</label><input type="password" id="senha-nova" required minlength="8" autocomplete="new-password"></div>
      <div class="field"><label for="senha-confirma">Confirmar senha nova</label><input type="password" id="senha-confirma" required minlength="8" autocomplete="new-password"></div>
      <p class="erro" id="erro" hidden></p>
      <p class="ok" id="ok" hidden>Senha trocada com sucesso.</p>
      <button type="submit" class="btn-primary" id="btn-submit">Trocar</button>
    </form>
  </article>
</main>

<script src="assets/jquery-3.6.1.min.js"></script>
<script src="assets/perfil.js"></script>
</body>
</html>
