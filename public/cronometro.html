<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronômetro · LabClock</title>

  <meta name="theme-color" content="#F5F0E6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#11141C" media="(prefers-color-scheme: dark)">

  <link rel="icon" href="https://nicchon.com/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/style.css">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('app-theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>

<header class="site-header">
  <a href="./" class="back-link" aria-label="Voltar para a lista de cronômetros">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    <span class="back-link-text">labclock</span>
  </a>
  <button type="button" class="theme-toggle" aria-label="Alternar tema claro/escuro" title="Alternar tema">
    <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
  </button>
</header>

<main class="container-cronometro">
  <article id="cronometro" class="cronometro-card" aria-busy="true">
    <p class="font-mono-meta" id="cronometro-status">Carregando…</p>
    <div class="editavel" id="bloco-nome">
      <h1 class="cronometro-nome" id="cronometro-nome">—</h1>
      <button type="button" class="btn-editar" id="btn-editar-nome" aria-label="Editar nome" title="Editar nome" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
    </div>
    <p class="cronometro-codigo" id="cronometro-codigo">—</p>
    <div class="editavel" id="bloco-display">
      <div class="cronometro-display" id="cronometro-display">--:--</div>
      <button type="button" class="btn-editar" id="btn-editar-tempo" aria-label="Editar tempo" title="Editar tempo" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
    </div>
    <div class="cronometro-botoes">
      <button type="button" class="btn-primary" data-acao="start" disabled>Iniciar</button>
      <button type="button" class="btn-sec"     data-acao="pause" disabled>Pausar</button>
      <button type="button" class="btn-sec"     data-acao="reset" disabled>Resetar</button>
    </div>
  </article>

  <section class="info-compartilhar">
    <h2 class="bloco-titulo">Compartilhar</h2>
    <p class="info-text">Manda essa URL pra qualquer dispositivo. Todos vão ver o cronômetro em sincronia.</p>
    <input type="text" id="share-url" class="input-readonly" readonly>
    <button type="button" id="copy-url" class="btn-sec">Copiar link</button>
  </section>
</main>

<script src="assets/jquery-3.6.1.min.js"></script>
<script src="assets/cronometro.js"></script>
</body>
</html>
