<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabClock — Central de cronômetros</title>

  <meta name="theme-color" content="#F5F0E6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#11141C" media="(prefers-color-scheme: dark)">

  <meta name="description" content="Cronômetros multi-dispositivo para laboratório químico e contextos com múltiplos ensaios paralelos.">
  <meta property="og:title" content="LabClock — Central de cronômetros">
  <meta property="og:description" content="Multi-dispositivo. Cronômetros compartilháveis por URL.">

  <link rel="icon" href="https://nicchon.com/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/style.css">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('app-theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>

<header class="site-header">
  <a href="https://app.nicchon.com/" class="back-link" aria-label="Voltar para o app.nicchon.com">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    <span class="back-link-text">app.nicchon.com</span>
  </a>
  <div id="user-area" class="user-area">
    <!-- preenchido pelo main.js: login-link OU user-chip com logout -->
  </div>
  <button type="button" class="theme-toggle" aria-label="Alternar tema claro/escuro" title="Alternar tema">
    <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
  </button>
</header>

<main class="container">
  <section class="hero">
    <p class="font-mono-meta">app.nicchon.com / labclock</p>
    <h1>LabClock.</h1>
    <p class="lede">
      Cronômetros regressivos compartilháveis entre dispositivos.
      Cria, abre por URL, monitora de qualquer lugar.
    </p>
  </section>

  <section class="bloco-criar">
    <h2 class="bloco-titulo">Criar novo</h2>
    <form id="form-criar" class="form-criar">
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Aquecimento sódio" maxlength="120">
      </div>
      <div class="field">
        <label for="tempo">Tempo (MM:SS ou segundos)</label>
        <input type="text" id="tempo" name="tempo" placeholder="15:00" value="01:00">
      </div>
      <button type="submit" class="btn-primary">Criar cronômetro</button>
    </form>
  </section>

  <section class="bloco-lista">
    <h2 class="bloco-titulo">Cronômetros existentes</h2>
    <div id="lista" class="grid-cronometros" aria-busy="true">
      <p class="state-msg">Carregando…</p>
    </div>
  </section>
</main>

<script src="assets/jquery-3.6.1.min.js"></script>
<script src="assets/main.js"></script>
</body>
</html>
